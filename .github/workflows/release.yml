name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    name: Release (Windows package)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Ensure tag commit belongs to origin/master
        shell: pwsh
        run: |
          git fetch origin master:refs/remotes/origin/master --force
          git merge-base --is-ancestor "$env:GITHUB_SHA" "origin/master"
          if ($LASTEXITCODE -ne 0) {
            throw "Ref $env:GITHUB_REF_NAME points to commit $env:GITHUB_SHA, which is not contained in origin/master."
          }

      - name: Build distributable package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          .\scripts\build_voice_agent.ps1 -Python "python" -CMake "cmake"

      - name: Validate build outputs and create release zip
        id: package
        shell: pwsh
        run: |
          $required = @(
            "dist/doubao-voice-agent/doubao-voice-agent.exe",
            "dist/doubao-voice-agent/_internal/overlay_ui.exe",
            "dist/doubao-voice-agent/_internal/opus.dll",
            "dist/doubao-voice-agent/_internal/libgcc_s_seh-1.dll",
            "dist/doubao-voice-agent/_internal/libwinpthread-1.dll"
          )

          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            throw "Missing build outputs:`n$($missing -join "`n")"
          }

          $zipName = "doubao-voice-agent-${env:GITHUB_REF_NAME}-windows-x64.zip"
          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }

          Compress-Archive -Path "dist/doubao-voice-agent" -DestinationPath $zipName -CompressionLevel Optimal
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Check GitHub CLI
        shell: pwsh
        run: gh --version

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = "${{ steps.package.outputs.zip_name }}"

          gh release view $tag --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag $asset --clobber --repo $env:GITHUB_REPOSITORY
          } else {
            gh release create $tag $asset --repo $env:GITHUB_REPOSITORY --title $tag --generate-notes
          }
