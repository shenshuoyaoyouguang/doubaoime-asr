name: CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-windows:
    name: Test (Windows full)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop,dev,build]"
          python -m pip install cryptography

      - name: Run full Windows test suite
        shell: pwsh
        run: |
          python -m pytest -q tests

  build-windows:
    name: Build (Windows package)
    runs-on: windows-latest
    needs:
      - test-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Build distributable package
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          .\scripts\build_voice_agent.ps1 -Python "python" -CMake "cmake"

      - name: Validate build outputs and create zip
        id: package
        shell: pwsh
        run: |
          $required = @(
            "dist/doubao-voice-agent/doubao-voice-agent.exe",
            "dist/doubao-voice-agent/_internal/overlay_ui.exe",
            "dist/doubao-voice-agent/_internal/opus.dll",
            "dist/doubao-voice-agent/_internal/libgcc_s_seh-1.dll",
            "dist/doubao-voice-agent/_internal/libwinpthread-1.dll"
          )

          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            throw "Missing build outputs:`n$($missing -join "`n")"
          }

          $zipName = "doubao-voice-agent-${env:GITHUB_SHA}-windows-x64.zip"
          if (Test-Path $zipName) {
            Remove-Item $zipName -Force
          }

          Compress-Archive -Path "dist/doubao-voice-agent" -DestinationPath $zipName -CompressionLevel Optimal
          "zip_name=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: doubao-voice-agent-windows-x64-${{ github.sha }}
          path: ${{ steps.package.outputs.zip_name }}
          if-no-files-found: error
          retention-days: 14
